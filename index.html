<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Document</title>
    <style>
        #msg {
            display: none;
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            color: white;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="container my-5 ">
        <div class="border bg-white rounded-5 p-4 shadow">
            <div>
                <h2 class="text-center">📋 Order Entry</h2>
            </div>

            <div class="mt-3">
                <label>SL NO</label>
                <input class="form-control" type="text" id="slno" readonly>
            </div>

            <div id="loader" class="text-center mt-2" style="display:none;">
                <div class="spinner-border text-primary" role="status"></div>
            </div>

            <div class="mt-3">
                <label>Date</label>
                <input class="form-control" type="date" id="date">
            </div>

            <div class="mt-3">
                <label>File Number</label>
                <input class="form-control" type="text" id="file">
            </div>

            <div class="mt-3">
                <label>Client</label>
                <input class="form-control" type="text" id="client">
            </div>

            <div class="mt-3">
                <label>Location</label>
                <input class="form-control" type="text" id="location">
            </div>

            <div class="mt-3">
                <label>Machine</label>
                <input class="form-control" type="text" id="machine">
            </div>

            <div class="mt-3">
                <label>Qty</label>
                <input class="form-control" type="number" id="qty">
            </div>

            <div class="d-grid gap-2 mt-3 ">
                <button id="submitBtn" onclick="sendData()" class="btn btn-primary" type="button">
                    Submit
                </button>

            </div>
            <div id="msg"></div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
        integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
        crossorigin="anonymous"></script>

    <script>

        const url = "https://script.google.com/macros/s/AKfycbyXjTmIVt4CmKAh_KTx8ZDiQFsMsQ5-SSaqosODrzcxY9knQz-xfH3Vrhsu_g4JGEL4/exec";

        // 🔥 MESSAGE FUNCTION
        function showMessage(text, type) {
            let msg = document.getElementById("msg");

            msg.innerText = text;
            msg.style.display = "block";

            if (type === "success") {
                msg.style.background = "#28a745";
            } else {
                msg.style.background = "#dc3545";
            }

            setTimeout(() => {
                msg.style.display = "none";
            }, 2500);
        }

        // 🔥 TODAY DATE
        function setTodayDate() {
            let d = new Date();
            document.getElementById("date").value =
                d.getFullYear() + "-" +
                String(d.getMonth() + 1).padStart(2, '0') + "-" +
                String(d.getDate()).padStart(2, '0');
        }

        // 🔥 SLNO AUTO
        function loadSno() {
            document.getElementById("loader").style.display = "block";
            document.getElementById("slno").value = "";

            fetch(url)
                .then(res => res.json())
                .then(data => {

                    let max = 0;

                    for (let i = 1; i < data.length; i++) {
                        let val = parseInt(data[i][0]);
                        if (!isNaN(val) && val > max) {
                            max = val;
                        }
                    }

                    document.getElementById("slno").value = max + 1;
                    document.getElementById("loader").style.display = "none";
                })
                .catch(err => {
                    document.getElementById("slno").value = 1;
                    document.getElementById("loader").style.display = "none";
                });
        }

        // 🔥 SEND DATA
        function sendData() {

            let btn = document.getElementById("submitBtn");

            // 🔥 disable button + show spinner
            btn.disabled = true;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Saving...`;

            let data = {
                sl_no: document.getElementById("slno").value,
                date: document.getElementById("date").value,
                fileNumber: document.getElementById("file").value,
                client: document.getElementById("client").value,
                location: document.getElementById("location").value,
                machine: document.getElementById("machine").value,
                qty: document.getElementById("qty").value
            };

            fetch(url, {
                method: "POST",
                body: JSON.stringify(data)
            })
                .then(res => res.text())
                .then(res => {

                    if (res.trim() === "Success") {

                        Swal.fire({
                            icon: 'success',
                            title: 'Saved!',
                            text: 'Data saved successfully ✅',
                            timer: 2000,
                            showConfirmButton: false
                        });

                        // clear form
                        document.getElementById("file").value = "";
                        document.getElementById("client").value = "";
                        document.getElementById("location").value = "";
                        document.getElementById("machine").value = "";
                        document.getElementById("qty").value = "";

                        loadSno();

                    } else {

                        Swal.fire({
                            icon: 'error',
                            title: 'Failed!',
                            text: 'Failed to save data ❌'
                        });
                    }

                    btn.disabled = false;
                    btn.innerHTML = "Submit";

                })
                .catch(err => {

                    Swal.fire({
                        icon: 'error',
                        title: 'Server Error',
                        text: 'Something went wrong ❌'
                    });

                    btn.disabled = false;
                    btn.innerHTML = "Submit";
                });
        }

        // 🔥 INIT
        loadSno();
        setTodayDate();

    </script>


</body>

</html>
