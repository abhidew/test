<!DOCTYPE html>
<html>

<head>
  <title>Employee Login + Form</title>
  <link rel="icon" type="image/x-icon" href="./24-hours-support.ico">
  <link rel="manifest" href="manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body { background: #eef2f7; }
    .box { max-width: 650px; margin: auto; margin-top: 40px; }
    .card { padding: 28px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
    h4 { font-size: 24px; font-weight: 600; }
    .form-control,.form-select { height: 48px; font-size: 16px; }
    .btn { height: 48px; font-size: 16px; font-weight: 600; }
    label { font-weight: 500; margin-bottom: 6px; }
    .spinner-border { width: 1.2rem; height: 1.2rem; }
  </style>
</head>

<body>

<div class="box">

  <!-- LOGIN -->
  <div class="card" id="loginBox">
    <h4>Login</h4>
    <input id="username" class="form-control mt-2" placeholder="Username">
    <input id="password" type="password" class="form-control mt-2" placeholder="Password">

    <button id="loginBtn" class="btn btn-primary w-100 mt-3" onclick="login()">
      <span id="loginText">Login</span>
      <span id="loginSpin" class="spinner-border spinner-border-sm d-none"></span>
    </button>
  </div>

  <!-- FORM -->
  <div id="formBox" class="d-none">
    <div class="card mt-4">
      <h4 class="mb-4">Employee Form</h4>

      <label>Type</label>
      <select id="type" class="form-select mb-3" onchange="toggleFields()">
        <option value="" disabled selected>-- Select Option --</option>
        <option value="ONVISIT">On Visit</option>
        <option value="NOVISIT">No Visit</option>
        <option value="LEAVE">Leave</option>
        <option value="OFFICE">Head Office</option>
      </select>

      <div id="dateBox" class="mb-3 d-none">
        <label>Date</label>
        <input type="date" id="date" class="form-control">
      </div>

      <div id="locationBox" class="mb-3 d-none">
        <label>Location/Area</label>
        <input type="text" id="loc" class="form-control">
      </div>

      <div id="wbBox" class="mb-3 d-none">
        <label>WeighBridge Detail</label>
        <input type="text" id="wb" class="form-control">
      </div>

      <div id="reasonBox" class="mb-3 d-none">
        <label>Reason</label>
        <input type="text" id="reason" class="form-control">
      </div>

      <div id="serviceBox" class="mb-3 d-none">
        <label>Service Detail</label>
        <input type="text" id="service" class="form-control">
      </div>
     

      <div id="consumedBox" class="mb-3 d-none">
        <label>Spare Consumption</label>
        <input type="text" id="consumed" class="form-control">
      </div>

      <div id="fromBox" class="mb-3 d-none">
        <label>From Date</label>
        <input type="date" id="fromdate" class="form-control">
      </div>

      <div id="toBox" class="mb-3 d-none">
        <label>To Date</label>
        <input type="date" id="todate" class="form-control">
      </div>

      <div id="leaveCountBox" class="mb-3 d-none">
        <label>Total Leave</label>
        <input type="text" id="leaveCount" class="form-control" readonly>
      </div>

      <div id="leaveRemarkBox" class="mb-3 d-none">
        <label>Leave Remark</label>
        <input type="text" id="leaveRemark" class="form-control">
      </div>

      <button id="submitBtn" onclick="submitData()" class="btn btn-primary w-100 d-none">
        <span id="btnText">Submit</span>
        <span id="btnSpin" class="spinner-border spinner-border-sm d-none"></span>
      </button>

    </div>
  </div>

</div>

<script>

 const url = "https://script.google.com/macros/s/AKfycbxK38ycMN6De51v0bF7qSyeY0bEGvYhG9ga45NOHaKn79vlNKRLcJ0QBJO__rjDDVWe/exec";


let empName = "";

// Default date
document.addEventListener("DOMContentLoaded", () => {
  let today = new Date().toISOString().split('T')[0];
  date.value = today;
  fromdate.value = today;
  todate.value = today;
});

// LOGIN
function login() {

  if (!username.value.trim() || !password.value.trim()) {
        Swal.fire("Error ❌", "Username & Password required", "error");
        return;
      }

  let btn = document.getElementById("loginBtn");
  let text = document.getElementById("loginText");
  let spin = document.getElementById("loginSpin");

  // ✅ START
  btn.disabled = true;
  text.innerText = "Logging...";
  spin.classList.remove("d-none");

  fetch(url,{
    method:"POST",
    body:JSON.stringify({
      action:"login",
      username:username.value,
      password:password.value
    })
  })
  .then(res=>res.json())
  .then(res=>{
    if(res.status=="success"){
      empName = res.name;
      loginBox.classList.add("d-none");
      formBox.classList.remove("d-none");
      Swal.fire("Welcome "+res.name,"","success");
    } else {
      Swal.fire("Invalid Login","","error");
    }
  })
  .catch(()=>{
    Swal.fire("Server Error","","error");
  })
  .finally(()=>{
    // ✅ STOP
    btn.disabled = false;
    text.innerText = "Login";
    spin.classList.add("d-none");
  });
}

// TOGGLE
function toggleFields(){
  clearFields();

  let t = type.value;

  let all = ["dateBox","locationBox","reasonBox","serviceBox","wbBox","consumedBox","fromBox","toBox","leaveCountBox","leaveRemarkBox"];
  all.forEach(id=>document.getElementById(id).classList.add("d-none"));

  submitBtn.classList.remove("d-none");

  if(t=="ONVISIT"){
    dateBox.classList.remove("d-none");
    locationBox.classList.remove("d-none");
    reasonBox.classList.remove("d-none");
    serviceBox.classList.remove("d-none");
    wbBox.classList.remove("d-none");
    consumedBox.classList.remove("d-none");
  }

  if(t=="NOVISIT"){
    dateBox.classList.remove("d-none");
  }

  if(t=="LEAVE"){
    fromBox.classList.remove("d-none");
    toBox.classList.remove("d-none");
    leaveCountBox.classList.remove("d-none");
    leaveRemarkBox.classList.remove("d-none");
  }

  if(t=="OFFICE"){
    dateBox.classList.remove("d-none");
  ///  locationBox.classList.remove("d-none");
  ///  reasonBox.classList.remove("d-none");
  }
}

// LEAVE CALC
fromdate.onchange = todate.onchange = ()=>{
  if(fromdate.value && todate.value){
    let d1=new Date(fromdate.value);
    let d2=new Date(todate.value);
    leaveCount.value=(d2-d1)/(1000*60*60*24)+1;
  }
};

// SUBMIT
function submitData(){

  if (!type.value) {
    Swal.fire("Please select Type ❌");
    return;
  }

  let btn = document.getElementById("submitBtn");
  let text = document.getElementById("btnText");
  let spin = document.getElementById("btnSpin");

  // ✅ START
  btn.disabled = true;
  text.innerText = "Saving...";
  spin.classList.remove("d-none");

  let leaveDays="";
  if(type.value=="LEAVE"){
    let d1=new Date(fromdate.value);
    let d2=new Date(todate.value);
    leaveDays=(d2-d1)/(1000*60*60*24)+1;
  }

  let data={
    EmpID:empName,
    Type:type.value,
    Reason:type.value=="LEAVE"?leaveRemark.value:reason.value,
    ServiceDetails:service.value,

    FromDate:type.value=="LEAVE"?fromdate.value:date.value,
    ToDate:type.value=="LEAVE"?todate.value:"",

    Location:document.getElementById("loc").value,

    WB:wb.value,
    ConsumedItems:consumed.value,
    Total_Leave:type.value=="LEAVE"?leaveDays:""
  };

  fetch(url,{
    method:"POST",
    body:JSON.stringify(data)
  })
  .then(()=>{
    Swal.fire("Saved!","","success");
    type.value="";
    toggleFields();
  })
  .catch(()=>{
    Swal.fire("Error ❌","Try again","error");
  })
  .finally(()=>{
    // ✅ STOP
    btn.disabled = false;
    text.innerText = "Submit";
    spin.classList.add("d-none");
  });
}

// CLEAR
function clearFields(){
  ["date","loc","reason","service","wb","consumed","fromdate","todate","leaveCount","leaveRemark"]
  .forEach(id=>document.getElementById(id).value="");

  let today=new Date().toISOString().split('T')[0];
  date.value=fromdate.value=todate.value=today;
}

</script>

</body>
</html>
